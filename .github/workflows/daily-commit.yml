name: Daily Auto Commit by 23f3000651@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 2:30 AM UTC (once per day, specific time)
  workflow_dispatch:  # Lets you trigger manually for testing

jobs:
  update-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Needed to push commits

      - name: Update status file by 23f3000651@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > STATUS.md  # Creates/updates a file with current date

      - name: Commit and push changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "23f3000651@ds.study.iitm.ac.in"
          git add STATUS.md
          git commit -m "Daily auto-update: $(date -u) by 23f3000651@ds.study.iitm.ac.in"
          git push
